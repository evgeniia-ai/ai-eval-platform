<svg width="680" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>AI Eval Platform — architecture after Phase 0</title>
  <desc>Two data sources feed the QA engine; human labeling produces ground truth; the judge is compared against it via MAE; results surface in Streamlit and a frozen public demo.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="600" fill="#FFFFFF"/>
  <text x="340" y="30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#2C2C2A">AI Eval Platform — architecture (Phase 0)</text>
  <text x="340" y="50" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5F5E5A">39 human-labeled calls · MAE vs human ground truth</text>

  <rect x="30" y="72" width="180" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="120" y="93" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#085041">Call transcripts</text>
  <text x="120" y="110" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0F6E56">7 seed + 32 GPT (cross-family)</text>

  <rect x="250" y="66" width="180" height="130" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#3C3489">QA engine (Claude judge)</text>
  <text x="340" y="108" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#534AB7">rubric v1.1</text>
  <text x="340" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#534AB7">5 weighted criteria</text>
  <text x="340" y="152" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#534AB7">score computed in code</text>
  <text x="340" y="174" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#534AB7">(deterministic)</text>

  <rect x="470" y="72" width="180" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="560" y="93" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#0C447C">FastAPI</text>
  <text x="560" y="110" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="11" fill="#185FA5">POST /evaluate-call</text>

  <rect x="250" y="230" width="180" height="86" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#3C3489">Storage: SQLite</text>
  <text x="340" y="272" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="11" fill="#534AB7">evaluations</text>
  <text x="340" y="290" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="11" fill="#534AB7">suite_runs</text>
  <text x="340" y="308" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="11" fill="#534AB7">human_reviews</text>

  <rect x="470" y="230" width="180" height="86" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="560" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#712B13">Human labeling</text>
  <text x="560" y="272" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#993C1D">annotation guidelines</text>
  <text x="560" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#993C1D">Observed / Concern / Impact</text>
  <text x="560" y="308" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#993C1D">= ground truth</text>

  <rect x="30" y="244" width="180" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="120" y="266" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#085041">MAE vs ground truth</text>
  <text x="120" y="286" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0F6E56">judge vs human</text>

  <rect x="30" y="360" width="180" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="120" y="382" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#085041">Baseline (33 calls)</text>
  <text x="120" y="402" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0F6E56">Opus 0.41 · Haiku 0.51</text>
  <text x="120" y="420" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0F6E56">Sonnet 0.58 · held-out kept</text>

  <rect x="250" y="360" width="180" height="72" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="340" y="382" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#712B13">Review queue</text>
  <text x="340" y="402" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#993C1D">score-based routing</text>
  <text x="340" y="420" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#993C1D">suite runs excluded</text>

  <rect x="470" y="360" width="180" height="72" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="560" y="382" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#712B13">Streamlit UI</text>
  <text x="560" y="402" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#993C1D">7 pages + demo mode</text>
  <text x="560" y="420" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#993C1D">frozen public showcase</text>

  <rect x="250" y="480" width="180" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="340" y="500" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#2C2C2A">CI: GitHub Actions</text>
  <text x="340" y="518" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5F5E5A">90+ tests passing</text>

  <line x1="210" y1="98" x2="248" y2="118" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="470" y1="106" x2="432" y2="120" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="196" x2="340" y2="228" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="470" y1="273" x2="432" y2="273" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="250" y1="273" x2="212" y2="273" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="120" y1="302" x2="120" y2="358" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="316" x2="340" y2="358" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="560" y1="316" x2="560" y2="358" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="340" y="565" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5F5E5A">Cross-family data (GPT) so the judge never scores its own output</text>
  <text x="340" y="583" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5F5E5A">Every score reproducible: model + rubric_version + run_id</text>
</svg>
