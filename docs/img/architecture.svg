<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="620" fill="#ffffff"/>

  <!-- Data sources -->
  <rect x="30" y="40" width="220" height="50" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="140" y="70" text-anchor="middle" font-size="13" fill="#1e1b4b">seed_transcripts.json</text>

  <rect x="30" y="110" width="220" height="50" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="140" y="140" text-anchor="middle" font-size="13" fill="#1e1b4b">generated_transcripts.json</text>

  <rect x="30" y="180" width="220" height="50" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="205" text-anchor="middle" font-size="13" fill="#14532d">data_gen.py</text>
  <text x="140" y="221" text-anchor="middle" font-size="11" fill="#166534">(DATAGEN_MODEL)</text>

  <!-- ingest.py -->
  <rect x="330" y="95" width="180" height="60" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="420" y="122" text-anchor="middle" font-size="13" fill="#7c2d12">ingest.py</text>
  <text x="420" y="139" text-anchor="middle" font-size="11" fill="#9a3412">batch pipeline</text>

  <!-- qa_engine.py -->
  <rect x="580" y="95" width="180" height="60" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="670" y="118" text-anchor="middle" font-size="13" fill="#7f1d1d">qa_engine.py</text>
  <text x="670" y="134" text-anchor="middle" font-size="11" fill="#991b1b">LLM-as-judge</text>
  <text x="670" y="148" text-anchor="middle" font-size="10" fill="#b91c1c">(ANTHROPIC_MODEL)</text>

  <!-- rubric.py feeding qa_engine -->
  <rect x="580" y="20" width="180" height="45" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="670" y="47" text-anchor="middle" font-size="12" fill="#4c1d95">rubric.py</text>
  <text x="670" y="60" text-anchor="middle" font-size="10" fill="#5b21b6">dimensions, weights</text>

  <!-- storage.py / SQLite -->
  <rect x="830" y="240" width="140" height="220" rx="6" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="900" y="265" text-anchor="middle" font-size="13" fill="#164e63" font-weight="600">storage.py</text>
  <line x1="845" y1="278" x2="955" y2="278" stroke="#67e8f9" stroke-width="1"/>
  <text x="900" y="298" text-anchor="middle" font-size="11" fill="#0e7490">SQLite (qa.db)</text>
  <rect x="845" y="312" width="110" height="28" rx="4" fill="#ffffff" stroke="#a5f3fc"/>
  <text x="900" y="330" text-anchor="middle" font-size="10" fill="#0e7490">evaluations</text>
  <rect x="845" y="346" width="110" height="28" rx="4" fill="#ffffff" stroke="#a5f3fc"/>
  <text x="900" y="364" text-anchor="middle" font-size="10" fill="#0e7490">suite_runs</text>
  <rect x="845" y="380" width="110" height="28" rx="4" fill="#ffffff" stroke="#a5f3fc"/>
  <text x="900" y="398" text-anchor="middle" font-size="10" fill="#0e7490">human_reviews</text>
  <text x="900" y="435" text-anchor="middle" font-size="10" fill="#0e7490">save() routes to</text>
  <text x="900" y="448" text-anchor="middle" font-size="10" fill="#0e7490">review.py on trigger</text>

  <!-- review.py -->
  <rect x="580" y="330" width="180" height="50" rx="6" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="670" y="356" text-anchor="middle" font-size="13" fill="#831843">review.py</text>
  <text x="670" y="372" text-anchor="middle" font-size="10" fill="#9d174d">needs_review() — pure fn</text>

  <!-- Consumers -->
  <rect x="330" y="480" width="180" height="55" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="420" y="503" text-anchor="middle" font-size="13" fill="#713f12">app.py</text>
  <text x="420" y="519" text-anchor="middle" font-size="10" fill="#854d0e">Streamlit dashboard</text>

  <rect x="580" y="480" width="180" height="55" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="670" y="503" text-anchor="middle" font-size="13" fill="#713f12">api.py</text>
  <text x="670" y="519" text-anchor="middle" font-size="10" fill="#854d0e">FastAPI /evaluate-call</text>

  <rect x="330" y="555" width="180" height="50" rx="6" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="420" y="578" text-anchor="middle" font-size="13" fill="#134e4a">coaching.py</text>
  <text x="420" y="594" text-anchor="middle" font-size="10" fill="#0f766e">per-rep coaching summary</text>

  <!-- Arrows: sources -> ingest -->
  <path d="M250 65 L330 110" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M250 135 L330 130" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M140 180 L140 165" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ingest -> qa_engine -->
  <path d="M510 125 L580 125" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <!-- rubric -> qa_engine -->
  <path d="M670 65 L670 95" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- qa_engine -> storage (via ingest saving) -->
  <path d="M760 140 C 800 170, 850 200, 890 240" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- storage -> review.py (routing) -->
  <path d="M830 360 L760 358" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- storage -> consumers -->
  <path d="M845 420 C 700 460, 550 480, 510 495" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M860 460 C 800 480, 750 490, 700 495" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M830 445 C 650 500, 500 540, 430 555" stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <text x="30" y="20" font-size="12" fill="#6b7280">Data sources / generation</text>
  <text x="330" y="20" font-size="12" fill="#6b7280">Pipeline</text>
  <text x="330" y="470" font-size="12" fill="#6b7280">Interfaces</text>
</svg>
