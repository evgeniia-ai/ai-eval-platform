name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run free tests (smoke + api)
        run: pytest -v
        # pytest.ini sets addopts = -m "not regression", so regression tests
        # (which need a live ANTHROPIC_API_KEY) are excluded automatically.
